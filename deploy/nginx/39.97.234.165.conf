server
{
    listen 80;
    listen [::]:80;
    server_name byang.top www.byang.top;

    # SSL 证书验证目录保持 HTTP（acme.sh 续期用）
    location ^~ /.well-known/ {
        root /www/wwwroot/landing/;
    }

    # 其他全部 301 到 HTTPS
    location / {
        return 301 https://www.byang.top$request_uri;
    }
}

# ==== HTTPS: bare domain → 301 到 www ====
server
{
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name byang.top;

    ssl_certificate     /etc/nginx/ssl/byang.top/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/byang.top/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    return 301 https://www.byang.top$request_uri;
}

# ==== HTTPS: www 域名实际服务 ====
server
{
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.byang.top;

    ssl_certificate     /etc/nginx/ssl/www.byang.top/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/www.byang.top/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    index index.php index.html index.htm default.php default.htm default.html;
    root /www/wwwroot/landing/;

    #CERT-APPLY-CHECK--START
    include /www/server/panel/vhost/nginx/well-known/39.97.234.165.conf;
    #CERT-APPLY-CHECK--END

    #SSL-START
    #error_page 404/404.html;
    #SSL-END

    #ERROR-PAGE-START
    #error_page 404 /404.html;
    #error_page 502 /502.html;
    #ERROR-PAGE-END

    #PROXY-START 另一个 langchain 项目（保留）
    location /langchain-projects/ {
        alias /www/wwwroot/landing/langchain-projects/public/;
        index index.html;
        try_files $uri $uri/ /langchain-projects/index.html;
    }

    #PROXY-START 条形码核对应用
    location /barcode/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
    #PROXY-END

    #PHP-INFO-START
    location ~ /purge(/.*) {
        proxy_cache_purge cache_one $host$1$is_args$args;
    }
    include /www/server/panel/vhost/nginx/proxy/39.97.234.165/*.conf;
    include enable-php-00.conf;
    #PHP-INFO-END

    #REWRITE-START
    include /www/server/panel/vhost/rewrite/39.97.234.165.conf;
    #REWRITE-END

    location ~ ^/(\.user.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README.md)
    {
        return 404;
    }

    location ~ \.well-known{
        allow all;
    }
    if ( $uri ~ "^/\.well-known/.*\.(php|jsp|py|js|css|lua|ts|go|zip|tar\.gz|rar|7z|sql|bak)$" ) {
        return 403;
    }

    access_log  /www/wwwlogs/39.97.234.165.log;
    error_log  /www/wwwlogs/39.97.234.165.error.log info;
}
