services:
  mysql:
    image: mysql:8.0
    container_name: barcode-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: barcode123
      MYSQL_DATABASE: barcode_checker
      MYSQL_CHARSET: utf8mb4
    ports:
      - "13306:3306"  # 可选：宿主机访问MySQL调试用
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - barcode-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pbarcode123"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: barcode-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://root:barcode123@mysql:3306/barcode_checker
      JWT_SECRET: barcode-checker-local-jwt-secret-change-me
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"
    networks:
      - barcode-net

volumes:
  mysql_data:

networks:
  barcode-net:
    driver: bridge
